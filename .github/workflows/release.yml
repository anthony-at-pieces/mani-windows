name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"

      - name: Package
        shell: pwsh
        run: .\scripts\package.ps1 -Version "${{ github.ref_name }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mani-${{ github.ref_name }}-windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
